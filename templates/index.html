<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Grader</title>
    <link
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"
    />
    <style>
      body {
        padding-top: 20px;
      }
      .card-header {
        background-color: #f8f9fa;
        font-weight: bold;
      }
      .table th,
      .table td {
        vertical-align: middle;
      }
      .progress {
        height: 20px;
      }
    </style>
  </head>
  <body>
    <!-- Bulk PDF Classification Section -->
    <div class="container mt-4">
      <h2 class="mb-3">Bulk PDF Classification</h2>

      <!-- Multiple file upload -->
      <div class="card mb-4 border-0 shadow-sm">
        <div class="card-header bg-white border-0">
          <strong>Upload Multiple PDFs (Up to 20 files)</strong>
        </div>
        <div class="card-body">
          <form id="bulkUploadForm" enctype="multipart/form-data">
            <div class="mb-3">
              <label for="pdfFiles" class="form-label">Select PDF Files</label>
              <input
                class="form-control form-control-sm"
                type="file"
                id="pdfFiles"
                name="files[]"
                multiple
                accept=".pdf"
              />
              <div class="form-text">
                Hold Ctrl/Cmd to select multiple files. Maximum 20 files.
              </div>
            </div>
            <button
              type="submit"
              class="btn btn-outline-dark btn-sm"
              id="bulkUploadBtn"
            >
              <span id="bulkUploadText">Upload and Classify</span>
              <span
                id="bulkUploadSpinner"
                class="spinner-border spinner-border-sm text-dark"
                style="display: none"
              ></span>
            </button>
          </form>
        </div>
      </div>

      <!-- ZIP upload -->
      <div class="card mb-4 border-0 shadow-sm">
        <div class="card-header bg-white border-0">
          <strong>Upload ZIP Archive</strong>
        </div>
        <div class="card-body">
          <form id="zipUploadForm" enctype="multipart/form-data">
            <div class="mb-3">
              <label for="zipFile" class="form-label">Select ZIP File</label>
              <input
                class="form-control form-control-sm"
                type="file"
                id="zipFile"
                name="zip_file"
                accept=".zip"
              />
              <div class="form-text">
                ZIP file containing PDFs. Will extract and process all PDFs.
              </div>
            </div>
            <button
              type="submit"
              class="btn btn-outline-secondary btn-sm"
              id="zipUploadBtn"
            >
              Upload ZIP and Classify
            </button>
          </form>
        </div>
      </div>

      <!-- Results -->
      <div id="bulkResults" style="display: none" class="mt-4">
        <h4 class="mb-3">Classification Results</h4>

        <div class="card mb-3 border-0">
          <div class="card-body p-3">
            <h6 id="summaryTitle" class="mb-2"></h6>
            <div id="summaryContent" class="small text-muted"></div>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-sm table-borderless" id="resultsTable">
            <thead class="text-muted small">
              <tr>
                <th>Filename</th>
                <th>Document Type</th>
                <th>Confidence</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="resultsBody" class="small">
              <!-- Results will be populated here -->
            </tbody>
          </table>
        </div>

        <button id="downloadCsvBtn" class="btn btn-outline-dark btn-sm mt-2">
          Download Results (CSV)
        </button>
      </div>
    </div>

    <!-- Progress Modal -->
    <div class="modal fade" id="progressModal" tabindex="-1">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header">
            <h6 class="modal-title mb-0">Processing Files</h6>
          </div>
          <div class="modal-body">
            <div class="progress" style="height: 10px">
              <div
                class="progress-bar"
                role="progressbar"
                style="width: 0%"
              ></div>
            </div>
            <p class="text-center mt-2 small text-muted" id="progressText">
              Starting...
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- include bulk script -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
